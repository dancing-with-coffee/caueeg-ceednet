# EDCC A-RACE — Adaptive Rank-Aware Cross-Entropy
#
# Key innovation: Class-dependent ordinal smoothing
#   Normal (ε=0.20):   ordinal-aware → suppress Normal↔Dementia confusion
#   MCI    (ε=0.05):   CE-like sharp → maintain clear MCI boundaries
#   Dementia (ε=0.20): ordinal-aware → suppress Dementia↔Normal confusion
#
# Combines:
#   - CE's strength: MCI sensitivity (Run 5: 53%, RACE: 63%)
#   - Ordinal's strength: Dementia sensitivity (CORAL: 67%, CE+OrdPen: 70%)
#
# Based on Run 5 settings (best overall: 61.02%)

model:
  d_model: 384
  core_dim: 192
  num_channels: 19
  num_classes: 3
  window_size: 800
  num_event_types: 6
  mamba_layers: 6
  mamba_d_state: 16
  gcn_layers: 2
  gcn_hidden: 384
  dropout: 0.15
  age_adversarial: true
  lambda_rev: 0.1
  use_coral: false

data:
  dataset_path: local/dataset/caueeg-dataset
  task: dementia
  file_format: edf
  window_size: 800
  window_stride: 200
  max_windows_train: 128
  max_windows_eval: 256
  transition_margin: 600
  normalize: true

training:
  lr: 0.00007
  weight_decay: 0.05
  total_epochs: 100
  warmup_epochs: 8
  batch_size: 8
  early_stopping_patience: 25
  mixed_precision: true

  # A-RACE: adaptive per-class ordinal smoothing
  use_race: true
  race_epsilon: [0.20, 0.05, 0.20]    # Normal=ordinal, MCI=CE-like, Dem=ordinal
  race_sigma: 0.5
  use_coral: false
  focal_gamma: 0.0
  ordinal_weight: 0.0

  loss_alpha: 0.6
  loss_beta: 0.4
  loss_gamma: 0.1
  label_smoothing: 0.05
  class_weights: [0.862, 0.949, 1.272]

  # Window auxiliary
  window_aux_weight: 0.3

  # Augmentation
  aug_noise_std: 0.03
  aug_window_drop: 0.05
  aug_channel_drop: 0.05
  mixup_alpha: 0.2

  # TTA
  tta_repeats: 8

  checkpoint_dir: local/edcc_checkpoints_arace
  seed: 42
